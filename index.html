<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Métis Homeland Map</title>
 
 <!-- Leaflet CSS -->
 <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" 
 integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" 
 crossorigin=""/>
 
 <!-- Custom CSS -->
 <link rel="stylesheet" href="css/style.css">
</head>
<body>
 <div id="map"></div>
 
 <!-- Bottom Control Bar -->
 <div class="bottom-bar">
 <!-- Left: Layer Toggles -->
 <div class="layer-toggles">
 <div class="layer-btn-wrapper">
 <button class="layer-btn active" data-layer="waterways" title="Waterways">
 <span class="icon">💧</span>
 <span class="label">Water</span>
 </button>
 <button class="layer-info-btn" data-layer="waterways" title="Water Info">ℹ️</button>
 </div>
 <div class="layer-btn-wrapper">
 <button class="layer-btn active" data-layer="trails" title="Cart Trails">
 <span class="icon">🛤️</span>
 <span class="label">Trails</span>
 </button>
 <button class="layer-info-btn" data-layer="trails" title="Trails Info">ℹ️</button>
 </div>
 <div class="layer-btn-wrapper">
 <button class="layer-btn active" data-layer="locations" title="Locations">
 <span class="icon">📍</span>
 <span class="label">Places</span>
 </button>
 <button class="layer-info-btn" data-layer="locations" title="Locations Info">ℹ️</button>
 </div>
 <div class="layer-btn-wrapper">
 <button class="layer-btn" data-layer="buffalo" title="Buffalo Herds">
 <span class="icon">🦬</span>
 <span class="label">Buffalo</span>
 </button>
 <button class="layer-info-btn" data-layer="buffalo" title="Buffalo Info">ℹ️</button>
 </div>
 </div>
 
 <!-- Right: Controls -->
 <div class="bar-controls">
 <button class="control-btn" id="statsToggle" title="Toggle Stats">
 <span class="icon">📊</span>
 </button>
 </div>
 </div>
 
 <!-- Collapsible Stats Panel -->
 <div class="stats-panel" id="statsPanel">
 <div class="stats-panel-header">
 <h3>Data Overview</h3>
 <button class="close-btn" id="closeStats">&times;</button>
 </div>
 <div class="stats-detail">
 <div class="stat-detail waterways">
 <div class="stat-label">Waterways</div>
 <div class="stat-value" id="stats-waterways-detail">--</div>
 <div class="stat-desc">Rivers, lakes, and streams</div>
 </div>
 <div class="stat-detail trails">
 <div class="stat-label">Cart Trails</div>
 <div class="stat-value" id="stats-trails-detail">--</div>
 <div class="stat-desc">Historic Métis trails</div>
 </div>
 <div class="stat-detail locations">
 <div class="stat-label">Locations</div>
 <div class="stat-value" id="stats-locations-detail">--</div>
 <div class="stat-desc">Settlements & communities</div>
 </div>
 <div class="stat-detail buffalo">
 <div class="stat-label">Buffalo Herds</div>
 <div class="stat-value" id="stats-buffalo-detail">--</div>
 <div class="stat-desc">Historical range zones</div>
 </div>
 </div>
 <div class="stats-source">
 <p>Data: Hornaday (1889), historical records</p>
 </div>
 </div>

 <!-- Unified Layer Info Panel -->
 <div class="layer-info-panel" id="layerInfoPanel">
 <div class="layer-info-header">
 <h3 id="layerInfoTitle">Layer Info</h3>
 <button class="close-btn" id="closeLayerInfo">&times;</button>
 </div>
 <div class="layer-info-content" id="layerInfoContent">
 <!-- Dynamic content loaded by JS -->
 </div>
 </div>
 
 <!-- Leaflet JS -->
 <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" 
 integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" 
 crossorigin=""></script>
 
 <!-- Embedded Data -->
 <script src="js/data.js"></script>
 
 <!-- Main JS -->
 <script src="js/main.js"></script>
</body>
</html>
